<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poopalotzi - Marina Management</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; }
        .loading { display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">
            <div class="text-xl">Loading Poopalotzi...</div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [user, setUser] = useState(null);
            const [boats, setBoats] = useState([]);
            const [marinas, setMarinas] = useState([]);

            // Check authentication on load
            useEffect(() => {
                fetch('/api/users/me')
                    .then(res => res.json())
                    .then(data => {
                        if (data.id) {
                            setUser(data);
                            setIsLoggedIn(true);
                            loadBoats();
                            loadMarinas();
                        }
                    })
                    .catch(() => setIsLoggedIn(false));
            }, []);

            const loadBoats = async () => {
                try {
                    const res = await fetch('/api/boats');
                    const data = await res.json();
                    setBoats(data);
                } catch (err) {
                    console.error('Failed to load boats:', err);
                }
            };

            const loadMarinas = async () => {
                try {
                    const res = await fetch('/api/marinas');
                    const data = await res.json();
                    setMarinas(data);
                } catch (err) {
                    console.error('Failed to load marinas:', err);
                }
            };

            const handleLogin = async (email, password) => {
                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    
                    if (res.ok) {
                        const userData = await res.json();
                        setUser(userData);
                        setIsLoggedIn(true);
                        loadBoats();
                        loadMarinas();
                    } else {
                        alert('Login failed');
                    }
                } catch (err) {
                    alert('Login error');
                }
            };

            const handleLogout = async () => {
                await fetch('/api/auth/logout', { method: 'POST' });
                setIsLoggedIn(false);
                setUser(null);
                setBoats([]);
                setMarinas([]);
            };

            if (!isLoggedIn) {
                return <LoginForm onLogin={handleLogin} />;
            }

            return (
                <div className="min-h-screen bg-gray-50">
                    <nav className="bg-blue-600 text-white p-4">
                        <div className="container mx-auto flex justify-between items-center">
                            <h1 className="text-2xl font-bold">🚤 Poopalotzi</h1>
                            <div className="flex items-center gap-4">
                                <span>Welcome, {user?.name || user?.email}</span>
                                <button 
                                    onClick={handleLogout}
                                    className="bg-blue-700 px-3 py-1 rounded hover:bg-blue-800"
                                >
                                    Logout
                                </button>
                            </div>
                        </div>
                    </nav>
                    
                    <div className="container mx-auto p-6">
                        <div className="grid md:grid-cols-2 gap-6">
                            <BoatsSection boats={boats} marinas={marinas} onRefresh={loadBoats} />
                            <MarinasSection marinas={marinas} />
                        </div>
                    </div>
                </div>
            );
        }

        function LoginForm({ onLogin }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                onLogin(email, password);
            };

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                    <div className="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
                        <h2 className="text-2xl font-bold text-center mb-6">🚤 Poopalotzi Login</h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium mb-1">Email</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="admin@poopalotzi.com"
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-1">Password</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="admin123"
                                    required
                                />
                            </div>
                            <button
                                type="submit"
                                className="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                Login
                            </button>
                        </form>
                        <div className="mt-4 text-sm text-gray-600 text-center">
                            <p>Test accounts:</p>
                            <p>Admin: admin@poopalotzi.com / admin123</p>
                            <p>Member: member@poopalotzi.com / member1234</p>
                        </div>
                    </div>
                </div>
            );
        }

        function BoatsSection({ boats, marinas, onRefresh }) {
            const [showAddForm, setShowAddForm] = useState(false);

            return (
                <div className="bg-white rounded-lg shadow-md p-6">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-xl font-bold">Your Boats</h2>
                        <button
                            onClick={() => setShowAddForm(!showAddForm)}
                            className="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700"
                        >
                            {showAddForm ? 'Cancel' : 'Add Boat'}
                        </button>
                    </div>

                    {showAddForm && (
                        <AddBoatForm 
                            marinas={marinas} 
                            onSuccess={() => {
                                setShowAddForm(false);
                                onRefresh();
                            }}
                            onCancel={() => setShowAddForm(false)}
                        />
                    )}

                    <div className="space-y-3">
                        {boats.length === 0 ? (
                            <p className="text-gray-500 text-center py-4">No boats registered yet</p>
                        ) : (
                            boats.map(boat => (
                                <div key={boat.id} className="border border-gray-200 rounded-lg p-4">
                                    <h3 className="font-semibold">{boat.name}</h3>
                                    <p className="text-sm text-gray-600">{boat.length}ft • {boat.type}</p>
                                    {boat.marina && (
                                        <p className="text-sm text-blue-600">📍 {boat.marina}</p>
                                    )}
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        function AddBoatForm({ marinas, onSuccess, onCancel }) {
            const [formData, setFormData] = useState({
                name: '',
                length: '',
                type: 'sailboat',
                marinaId: ''
            });

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    const res = await fetch('/api/boats', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            ...formData,
                            length: parseInt(formData.length),
                            marinaId: formData.marinaId ? parseInt(formData.marinaId) : null
                        })
                    });
                    
                    if (res.ok) {
                        onSuccess();
                    } else {
                        alert('Failed to add boat');
                    }
                } catch (err) {
                    alert('Error adding boat');
                }
            };

            return (
                <form onSubmit={handleSubmit} className="bg-gray-50 p-4 rounded-lg mb-4 space-y-3">
                    <div>
                        <label className="block text-sm font-medium mb-1">Boat Name</label>
                        <input
                            type="text"
                            value={formData.name}
                            onChange={(e) => setFormData({...formData, name: e.target.value})}
                            className="w-full px-3 py-2 border border-gray-300 rounded-md"
                            required
                        />
                    </div>
                    <div>
                        <label className="block text-sm font-medium mb-1">Length (feet)</label>
                        <input
                            type="number"
                            value={formData.length}
                            onChange={(e) => setFormData({...formData, length: e.target.value})}
                            className="w-full px-3 py-2 border border-gray-300 rounded-md"
                            required
                        />
                    </div>
                    <div>
                        <label className="block text-sm font-medium mb-1">Type</label>
                        <select
                            value={formData.type}
                            onChange={(e) => setFormData({...formData, type: e.target.value})}
                            className="w-full px-3 py-2 border border-gray-300 rounded-md"
                        >
                            <option value="sailboat">Sailboat</option>
                            <option value="motorboat">Motorboat</option>
                            <option value="yacht">Yacht</option>
                            <option value="catamaran">Catamaran</option>
                        </select>
                    </div>
                    <div>
                        <label className="block text-sm font-medium mb-1">Marina (optional)</label>
                        <select
                            value={formData.marinaId}
                            onChange={(e) => setFormData({...formData, marinaId: e.target.value})}
                            className="w-full px-3 py-2 border border-gray-300 rounded-md"
                        >
                            <option value="">Select a marina...</option>
                            {marinas.map(marina => (
                                <option key={marina.id} value={marina.id}>
                                    {marina.name} - {marina.location}
                                </option>
                            ))}
                        </select>
                    </div>
                    <div className="flex gap-2">
                        <button
                            type="submit"
                            className="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700"
                        >
                            Add Boat
                        </button>
                        <button
                            type="button"
                            onClick={onCancel}
                            className="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600"
                        >
                            Cancel
                        </button>
                    </div>
                </form>
            );
        }

        function MarinasSection({ marinas }) {
            return (
                <div className="bg-white rounded-lg shadow-md p-6">
                    <h2 className="text-xl font-bold mb-4">Available Marinas</h2>
                    <div className="space-y-3">
                        {marinas.length === 0 ? (
                            <p className="text-gray-500 text-center py-4">No marinas available</p>
                        ) : (
                            marinas.map(marina => (
                                <div key={marina.id} className="border border-gray-200 rounded-lg p-4">
                                    <h3 className="font-semibold">{marina.name}</h3>
                                    <p className="text-sm text-gray-600">📍 {marina.location}</p>
                                    {marina.phone && (
                                        <p className="text-sm text-gray-600">📞 {marina.phone}</p>
                                    )}
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
