<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poopalotzi Marina Management</title>
  <link rel="stylesheet" href="/src/index.css">
</head>
<body>
  <div id="root"></div>
  <script>
    // Simple module polyfill for development
    window.process = { env: { NODE_ENV: 'development' } };
  </script>
  <script type="module">
    import React from '/node_modules/react/index.js';
    import { createRoot } from '/node_modules/react-dom/client.js';
    
    // Simple React app bootstrap
    const root = createRoot(document.getElementById('root'));
    
    function App() {
      return React.createElement('div', { 
        style: { 
          padding: '2rem', 
          fontFamily: 'system-ui', 
          textAlign: 'center' 
        } 
      }, [
        React.createElement('h1', { key: 'title' }, 'Poopalotzi Marina Management'),
        React.createElement('p', { key: 'status' }, 'System Ready - Backend Connected'),
        React.createElement('div', { 
          key: 'features',
          style: { marginTop: '2rem' }
        }, [
          React.createElement('h3', { key: 'h3' }, 'Features Available:'),
          React.createElement('ul', { 
            key: 'list',
            style: { textAlign: 'left', display: 'inline-block' }
          }, [
            React.createElement('li', { key: '1' }, 'User Authentication'),
            React.createElement('li', { key: '2' }, 'Boat Registration'),
            React.createElement('li', { key: '3' }, 'Marina Management'),
            React.createElement('li', { key: '4' }, 'Service Requests'),
            React.createElement('li', { key: '5' }, 'Image Uploads')
          ])
        ])
      ]);
    }
    
    root.render(React.createElement(App));
  </script>
</body>
</html>
